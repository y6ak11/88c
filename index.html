<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>88 Café - لوحة التحكم</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  font-family: 'Cairo', Tahoma;
  margin:0;
  background: linear-gradient(135deg,#0b0f0c,#1a2a22,#2f4f3f);
  color:#f1f1f1;
}

h1{
  text-align:center;
  padding:20px;
  color:#c7a86b;
}

/* فلاتر */
#filters{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-bottom:15px;
}

#filters input, #filters button{
  padding:10px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
}

/* كروت */
#ordersContainer{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:15px;
}

.order-card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(18px);
  border-radius:20px;
  padding:15px;
  transition:0.3s;
}

.order-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

/* ✨ وميض الطلب */
@keyframes blink {
  0%{box-shadow:0 0 10px #ff0000;}
  50%{box-shadow:0 0 25px #ff0000;}
  100%{box-shadow:0 0 10px #ff0000;}
}

.blink{
  animation: blink 1s infinite;
}

.status{
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

.pending{ background:orange; }
.done{ background:green; }
.cancel{ background:red; }

.order-item{
  background:rgba(255,255,255,0.1);
  margin:5px 0;
  padding:8px;
  border-radius:10px;
}

.actions{
  display:flex;
  gap:5px;
  margin-top:10px;
}

button{
  flex:1;
  padding:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.delete{ background:red; }
.edit{ background:blue; }
.statusBtn{ background:#c7a86b; }
.reset{ background:green; }

.total{
  text-align:right;
  margin-top:10px;
  color:#c7a86b;
}
</style>
</head>

<body>

<h1>لوحة تحكم 88 Café ☕</h1>

<div id="filters">
  <input id="filterTable" placeholder="رقم الطاولة">
  <input id="filterItem" placeholder="اسم الصنف">
  <button id="enableNotif">تفعيل الصوت 🔊</button>
  <button onclick="testSound()">اختبار الصوت</button>
</div>

<div id="ordersContainer"></div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  databaseURL: "https://cafe-51180-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const container = document.getElementById("ordersContainer");
const enableNotifBtn = document.getElementById("enableNotif");

let notifEnabled = false;
let audioUnlocked = false;
let allOrders = [];

// 🔊 صوت قوي
const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-alarm-digital-clock-beep-989.mp3");
audio.volume = 1;

// 🔓 فك حظر الصوت
document.body.addEventListener("click", ()=>{
  if(!audioUnlocked){
    audio.play().then(()=>{
      audio.pause();
      audio.currentTime=0;
      audioUnlocked = true;
    }).catch(()=>{});
  }
});

// تشغيل صوت قوي
function playStrongAlert(){
  let count=0;
  const i=setInterval(()=>{
    audio.currentTime=0;
    audio.play().catch(()=>{});
    count++;
    if(count>=5) clearInterval(i);
  },1000);
}

// زر التفعيل
enableNotifBtn.onclick = async ()=>{
  try{
    await audio.play();
    audio.pause();
    audio.currentTime=0;

    const perm = await Notification.requestPermission();
    if(perm==="granted"){
      notifEnabled=true;
      alert("تم تفعيل الصوت والإشعارات ✅");
    }
  }catch{
    alert("اضغط على الشاشة مرة لتفعيل الصوت");
  }
};

// اختبار
function testSound(){
  playStrongAlert();
}

// جلب الطلبات
db.ref("orders").on("value", snapshot=>{
  const data = snapshot.val()||{};
  let newOrder=false;
  allOrders=[];

  Object.keys(data).forEach(table=>{
    Object.keys(data[table]).forEach(id=>{
      const order=data[table][id];

      if(!order.seen){
        newOrder=true;
        db.ref(`orders/${table}/${id}/seen`).set(true);
      }

      allOrders.push({id,table,...order});
    });
  });

  if(newOrder && notifEnabled){
    new Notification("طلب جديد ☕");
    playStrongAlert();
    navigator.vibrate([500,200,500]);
  }

  render();
});

// عرض
function render(){
  container.innerHTML="";

  allOrders.forEach(o=>{
    const card=document.createElement("div");
    card.className="order-card";

    // ✨ وميض إذا جديد
    if(o.seen === true && Date.now() - o.timestamp < 120000){
      card.classList.add("blink");

      setTimeout(()=>{
        card.classList.remove("blink");
      },120000);
    }

    card.innerHTML=`
      <div class="order-header">
        <span>طاولة ${o.table}</span>
        <span class="status ${o.status || "pending"}">
        ${o.status==="done"?"جاهز":"قيد التحضير"}
        </span>
      </div>

      ${o.orders.map(i=>`
        <div class="order-item">
          ${i.name} ×${i.quantity}
        </div>
      `).join("")}

      <div class="total">
        ${o.orders.reduce((s,i)=>s+i.price*i.quantity,0)} د.ع
      </div>

      <div class="actions">
        <button class="delete">حذف</button>
        <button class="edit">ملاحظة</button>
        <button class="statusBtn">حالة</button>
        <button class="reset">تصفير</button>
      </div>
    `;

    const total = o.orders.reduce((s,i)=>s+i.price*i.quantity,0);

    card.querySelector(".delete").onclick=()=> db.ref(`orders/${o.table}/${o.id}`).remove();

    card.querySelector(".edit").onclick=()=>{
      let n=prompt("ملاحظة:", o.note||"");
      if(n!==null) db.ref(`orders/${o.table}/${o.id}`).update({note:n});
    }

    card.querySelector(".statusBtn").onclick=()=>{
      let s=prompt("pending / done / cancel");
      if(s) db.ref(`orders/${o.table}/${o.id}`).update({status:s});
    }

    card.querySelector(".reset").onclick=()=>{
      db.ref(`orders/${o.table}/${o.id}`).remove();
    }

    container.appendChild(card);
  });
}
</script>

</body>
</html>
