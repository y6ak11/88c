<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>88 Café - Admin Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

<style>
body {
  font-family: Tahoma, sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  padding:10px;
}

/* عنوان */
h1 {
  text-align:center;
  color:#ffd369;
  margin-bottom:10px;
}

/* فلاتر */
#filters {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

#filters input {
  padding:8px;
  border-radius:10px;
  border:none;
  text-align:center;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* الحاوية */
#ordersContainer {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
}

/* كارت الطلب */
.order-card {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border-radius:15px;
  padding:15px;
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
  transition:0.3s;
}

.order-card:hover {
  transform:scale(1.03);
}

/* الهيدر */
.order-header {
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
}

/* العناصر */
.order-item {
  background:rgba(255,255,255,0.12);
  margin:4px 0;
  padding:6px;
  border-radius:8px;
  font-size:14px;
}

/* الحالة */
.status {
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
}
.pending{ background:orange; }
.done{ background:green; }
.cancel{ background:red; }

/* أزرار */
.actions {
  display:flex;
  gap:6px;
  margin-top:10px;
}
button {
  flex:1;
  padding:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.delete{ background:#ff4d4d; color:white; }
.edit{ background:#4da6ff; color:white; }
.statusBtn{ background:#ffd369; }
.clearTable{ background:#ff9900; color:white; }
.calcProfit{ background:#4dff88; color:black; }

/* الملاحظة والمجموع */
.note{ font-size:13px; color:#ccc; }
.total{ text-align:right; margin-top:8px; font-weight:bold; }
</style>
</head>
<body>

<h1>لوحة تحكم 88 Café ☕</h1>

<div id="filters">
  <input id="filterTable" placeholder="رقم الطاولة">
  <input id="filterItem" placeholder="اسم الصنف">
  <button id="profitDayBtn" class="calcProfit">ربح اليوم</button>
  <button id="profitMonthBtn" class="calcProfit">ربح الشهر</button>
</div>

<div id="ordersContainer"></div>

<script>
// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyD4pAwLVIJp-YOzMX2WDqxAseTDxP3lek8",
  authDomain: "cafe-51180.firebaseapp.com",
  databaseURL: "https://cafe-51180-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cafe-51180",
  messagingSenderId: "723529852593",
  appId: "1:723529852593:web:f7899b203b47c2f5b6a490"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const messaging = firebase.messaging();

const container = document.getElementById("ordersContainer");
const filterTable = document.getElementById("filterTable");
const filterItem = document.getElementById("filterItem");

let allOrders = [];
let todayProfit = 0;

// ===== طلب إذن الإشعارات =====
Notification.requestPermission().then(p=>{
  if(p==="granted"){
    console.log("الإشعارات مسموحة");
    messaging.getToken({ vapidKey:"YOUR_PUBLIC_VAPID_KEY" }).then(t=>{
      console.log("Device token:",t);
    });
  }
});

// ===== استقبال إشعار فور وصول الطلب =====
messaging.onMessage(payload=>{
  const n = payload.notification;
  new Notification(n.title, { body:n.body, icon:n.icon, image:n.image });
  if(n.sound){
    new Audio(n.sound).play();
  }
  if(n.vibrate && navigator.vibrate) navigator.vibrate([300,100,300]);
});

// ===== جلب البيانات =====
db.ref("orders").on("value", snapshot=>{
  const data = snapshot.val() || {};
  allOrders = [];
  Object.keys(data).forEach(table=>{
    Object.keys(data[table]).forEach(id=>{
      allOrders.push({
        id, table, ...data[table][id]
      });
    });
  });
  render();
});

// ===== عرض الطلبات =====
function render(){
  container.innerHTML="";
  const tFilter = filterTable.value.trim();
  const iFilter = filterItem.value.toLowerCase();

  allOrders
    .filter(o=>{
      const tableMatch = tFilter ? o.table==tFilter : true;
      const itemMatch = iFilter ? o.orders.some(x=>x.name.toLowerCase().includes(iFilter)) : true;
      return tableMatch && itemMatch;
    })
    .sort((a,b)=>b.timestamp-a.timestamp)
    .forEach(o=>{
      const card = document.createElement("div");
      card.className="order-card";
      const statusClass = o.status || "pending";

      card.innerHTML=`
        <div class="order-header">
          <span>طاولة ${o.table}</span>
          <span class="status ${statusClass}">
            ${statusClass==="done"?"جاهز":statusClass==="cancel"?"ملغي":"قيد التحضير"}
          </span>
        </div>
        ${o.orders.map(i=>`<div class="order-item">${i.name} ×${i.quantity}</div>`).join("")}
        <div class="note">${o.note||""}</div>
        <div class="total">${o.orders.reduce((s,i)=>s+i.price*i.quantity,0)} د.ع</div>
        <div class="actions">
          <button class="delete">حذف</button>
          <button class="edit">تعديل</button>
          <button class="statusBtn">تغيير الحالة</button>
          <button class="clearTable">تصفير الطاولة</button>
        </div>
      `;

      // حذف
      card.querySelector(".delete").onclick=()=>db.ref(`orders/${o.table}/${o.id}`).remove();

      // تعديل
      card.querySelector(".edit").onclick=()=>{
        const newNote = prompt("عدل الملاحظة:", o.note||"");
        if(newNote!==null) db.ref(`orders/${o.table}/${o.id}`).update({note:newNote});
      };

      // تغيير الحالة
      card.querySelector(".statusBtn").onclick=()=>{
        const newStatus = prompt("اكتب الحالة: pending / done / cancel");
        if(newStatus) db.ref(`orders/${o.table}/${o.id}`).update({status:newStatus});
      };

      // تصفير الطاولة + إضافة للربح اليوم
      card.querySelector(".clearTable").onclick=()=>{
        const total = o.orders.reduce((s,i)=>s+i.price*i.quantity,0);
        todayProfit += total;
        db.ref(`orders/${o.table}`).remove();
        alert(`تم تصفير الطاولة ${o.table}. تمت إضافة ${total} د.ع للربح اليوم.`);
      };

      container.appendChild(card);
    });
}

// ===== حساب الربح =====
document.getElementById("profitDayBtn").onclick=()=>{
  alert(`ربح اليوم: ${todayProfit} د.ع`);
};
document.getElementById("profitMonthBtn").onclick=()=>{
  alert(`ربح الشهر: ${(todayProfit*30).toFixed(0)} د.ع تقريبياً`);
};

// ===== فلترة =====
filterTable.oninput=render;
filterItem.oninput=render;

</script>
</body>
</html>
