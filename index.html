<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>88 Café - لوحة التحكم</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:'Cairo',Tahoma;
  background:linear-gradient(135deg,#0b0f0c,#1a2a22,#2f4f3f);
  color:#fff;
}

h1{
  text-align:center;
  padding:20px;
  color:#d4af37;
}

/* فلاتر */
#filters{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:10px;
}

#filters input, #filters button{
  padding:10px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

#filters button:hover{
  background:#d4af37;
  color:black;
}

/* كروت الطلبات */
#ordersContainer{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:15px;
}

.order-card{
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  padding:15px;
  backdrop-filter:blur(15px);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
  transition:0.3s;
  position:relative;
}

.order-card:hover{
  transform:translateY(-5px);
}

/* وميض الطلب الجديد */
@keyframes blink {
  0%{box-shadow:0 0 10px red;}
  50%{box-shadow:0 0 25px red;}
  100%{box-shadow:0 0 10px red;}
}

.blink{
  animation:blink 1s infinite;
}

.order-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-weight:bold;
}

.status{
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

.pending{background:#ff9800;}
.done{background:#4caf50;}
.cancel{background:#e53935;}

.order-item{
  background:rgba(255,255,255,0.1);
  margin:5px 0;
  padding:8px;
  border-radius:10px;
}

.total{
  text-align:right;
  margin-top:10px;
  color:#d4af37;
  font-weight:bold;
}

.actions{
  display:flex;
  gap:5px;
  margin-top:10px;
}

.actions button{
  flex:1;
  padding:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

.delete{background:#ff4d4d;}
.edit{background:#2196f3;}
.statusBtn{background:#d4af37; color:black;}
.reset{background:#2ecc71;}
</style>
</head>

<body>

<h1>☕ لوحة تحكم 88 Café</h1>

<div id="filters">
  <input id="filterTable" placeholder="رقم الطاولة">
  <input id="filterItem" placeholder="اسم الصنف">
  <button id="enableNotif">تفعيل الصوت 🔊</button>
  <button onclick="playStrongAlert()">اختبار الصوت</button>
</div>

<div id="ordersContainer"></div>

<script>
// ===== Firebase =====
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  databaseURL: "https://cafe-51180-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const container = document.getElementById("ordersContainer");
const enableNotifBtn = document.getElementById("enableNotif");
const filterTable = document.getElementById("filterTable");
const filterItem = document.getElementById("filterItem");

let notifEnabled = false;
let audioUnlocked = false;
let allOrders = [];

// ===== صوت من جهازك =====
const audio = new Audio("sound.mp3"); // ضع ملف الصوت في نفس المجلد
audio.volume = 1;
audio.preload = "auto";

// ===== فك الحظر الصوتي =====
document.body.addEventListener("click", ()=>{
  if(!audioUnlocked){
    audio.play().then(()=>{audio.pause(); audio.currentTime=0; audioUnlocked=true;}).catch(()=>{});
  }
});

// ===== تشغيل صوت قوي مع تكرار =====
function playStrongAlert(){
  let count = 0;
  function play(){
    audio.currentTime = 0;
    audio.play().catch(()=>{});
    count++;
    if(count < 2){ // تكرار مرتين
      setTimeout(play, 1000);
    }
    // اهتزاز الهاتف
    if("vibrate" in navigator) navigator.vibrate([500,200,500]);
  }
  play();
}

// ===== تفعيل الصوت والإشعارات =====
enableNotifBtn.onclick = async ()=>{
  try{
    await audio.play();
    audio.pause();
    audio.currentTime = 0;

    const perm = await Notification.requestPermission();
    if(perm === "granted"){
      notifEnabled = true;
      alert("تم تفعيل الصوت والإشعارات ✅");
    } else {
      alert("الإشعارات لن تعمل ⚠️");
    }

  }catch{
    alert("اضغط على الصفحة لتفعيل الصوت");
  }
};

// ===== جلب الطلبات =====
db.ref("orders").on("value", snap=>{
  const data = snap.val() || {};
  let newOrder = false;
  allOrders = [];

  Object.keys(data).forEach(table=>{
    Object.keys(data[table]).forEach(id=>{
      const o = data[table][id];
      if(!o.seen){
        newOrder = true;
        db.ref(`orders/${table}/${id}/seen`).set(true);
      }
      allOrders.push({id,table,...o});
    });
  });

  if(newOrder && notifEnabled){
    new Notification("طلب جديد ☕","يوجد طلب جديد في اللوحة");
    playStrongAlert();
  }

  render();
});

// ===== عرض الطلبات =====
function render(){
  container.innerHTML="";

  const t = filterTable.value.trim();
  const i = filterItem.value.toLowerCase();

  allOrders
  .filter(o=>{
    const tMatch = t ? o.table==t : true;
    const iMatch = i ? o.orders.some(x=>x.name.toLowerCase().includes(i)) : true;
    return tMatch && iMatch;
  })
  .sort((a,b)=>b.timestamp-a.timestamp)
  .forEach(o=>{
    const card=document.createElement("div");
    card.className="order-card";

    // وميض الطلب الجديد لمدة دقيقتين
    if(Date.now() - o.timestamp < 120000){
      card.classList.add("blink");
      setTimeout(()=>card.classList.remove("blink"),120000);
    }

    card.innerHTML=`
      <div class="order-header">
        <span>طاولة ${o.table}</span>
        <span class="status ${o.status||"pending"}">
          ${o.status==="done"?"جاهز":o.status==="cancel"?"ملغي":"قيد التحضير"}
        </span>
      </div>

      ${o.orders.map(i=>`
        <div class="order-item">
          ${i.name} ×${i.quantity} (${i.price*i.quantity} د.ع)
        </div>
      `).join("")}

      <div class="total">
        ${o.orders.reduce((s,i)=>s+i.price*i.quantity,0)} د.ع
      </div>

      <div class="actions">
        <button class="delete">حذف</button>
        <button class="edit">تعديل ملاحظة</button>
        <button class="statusBtn">تغيير الحالة</button>
        <button class="reset">تصفير الطاولة</button>
      </div>
    `;

    const total = o.orders.reduce((s,i)=>s+i.price*i.quantity,0);

    card.querySelector(".delete").onclick = ()=>{ 
      if(confirm("هل تريد حذف هذا الطلب؟")) db.ref(`orders/${o.table}/${o.id}`).remove(); 
    };

    card.querySelector(".edit").onclick = ()=>{ 
      let note = prompt("عدل الملاحظة:", o.note || "");
      if(note !== null) db.ref(`orders/${o.table}/${o.id}`).update({note}); 
    };

    card.querySelector(".statusBtn").onclick = ()=>{ 
      let status = prompt("pending / done / cancel");
      if(status) db.ref(`orders/${o.table}/${o.id}`).update({status}); 
    };

    card.querySelector(".reset").onclick = ()=>{ 
      if(confirm("تصفير الطاولة؟ سيتم إضافة المبلغ للربح اليوم")){
        db.ref(`profits/${new Date().toISOString().slice(0,10)}`).transaction(curr => (curr||0)+total);
        db.ref(`orders/${o.table}/${o.id}`).remove();
      }
    };

    container.appendChild(card);
  });
}

// ===== فلترة =====
filterTable.oninput = render;
filterItem.oninput = render;

</script>

</body>
</html>
