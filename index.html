<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>88 Café - لوحة التحكم</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:'Cairo',Tahoma;
  background:linear-gradient(135deg,#0b0f0c,#1a2a22,#2f4f3f);
  color:#fff;
}

/* 🔥 بانر التنبيه */
#alertBanner{
  position:fixed;
  top:-80px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(45deg,#ff0000,#ff6600);
  padding:15px 30px;
  border-radius:12px;
  font-weight:bold;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:0.5s;
  z-index:999;
}

#alertBanner.show{
  top:20px;
}

/* العنوان */
h1{
  text-align:center;
  padding:20px;
  color:#d4af37;
}

/* الفلاتر */
#filters{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:10px;
}

#filters input, #filters button{
  padding:10px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

#filters button:hover{
  background:#d4af37;
  color:black;
}

/* الكروت */
#ordersContainer{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  padding:15px;
}

.order-card{
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  padding:15px;
  backdrop-filter:blur(15px);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
  transition:0.3s;
}

.order-card:hover{
  transform:translateY(-5px) scale(1.02);
}

/* ✨ وميض احترافي */
@keyframes blink {
  0%{box-shadow:0 0 5px red;}
  50%{box-shadow:0 0 30px red;}
  100%{box-shadow:0 0 5px red;}
}

.blink{
  animation:blink 1s infinite;
  border:1px solid red;
}

.order-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-weight:bold;
}

.status{
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
}

.pending{background:#ff9800;}
.done{background:#4caf50;}
.cancel{background:#e53935;}

.order-item{
  background:rgba(255,255,255,0.1);
  margin:5px 0;
  padding:8px;
  border-radius:10px;
}

.total{
  text-align:right;
  margin-top:10px;
  color:#d4af37;
  font-weight:bold;
}

.actions{
  display:flex;
  gap:5px;
  margin-top:10px;
}

button{
  flex:1;
  padding:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.delete{background:#ff4d4d; color:white;}
.edit{background:#2196f3; color:white;}
.statusBtn{background:#d4af37; color:black;}
.reset{background:#2ecc71; color:white;}
</style>
</head>

<body>

<div id="alertBanner">🚨 طلب جديد وصل</div>

<h1>☕ لوحة تحكم 88 Café</h1>

<div id="filters">
  <input id="filterTable" placeholder="رقم الطاولة">
  <input id="filterItem" placeholder="اسم الصنف">
  <button id="enableNotif">تفعيل الصوت 🔊</button>
  <button onclick="playStrongAlert()">اختبار الصوت</button>
</div>

<div id="ordersContainer"></div>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  databaseURL: "https://cafe-51180-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const container = document.getElementById("ordersContainer");
const enableNotifBtn = document.getElementById("enableNotif");
const alertBanner = document.getElementById("alertBanner");

let notifEnabled = false;
let audioUnlocked = false;
let allOrders = [];

// 🔊 صوت من جهازك
const audio = new Audio("sound.mp3");
audio.volume = 1;
audio.preload = "auto";

// 🔓 فك الحظر
document.body.addEventListener("click", ()=>{
  if(!audioUnlocked){
    audio.play().then(()=>{
      audio.pause();
      audio.currentTime=0;
      audioUnlocked = true;
    }).catch(()=>{});
  }
});

// 🔊 + 📳 تنبيه مرتين
function playStrongAlert(){
  let count = 0;

  function play(){
    audio.currentTime = 0;
    audio.play().catch(()=>{});

    if("vibrate" in navigator){
      navigator.vibrate([300,150,300,150,500]);
    }

    count++;
    if(count < 2){
      setTimeout(play,1200);
    }
  }

  play();
}

// 🚨 بانر
function showBanner(){
  alertBanner.classList.add("show");
  setTimeout(()=>{
    alertBanner.classList.remove("show");
  },3000);
}

// زر التفعيل
enableNotifBtn.onclick = async ()=>{
  try{
    await audio.play();
    audio.pause();
    audio.currentTime = 0;

    const perm = await Notification.requestPermission();

    if(perm === "granted"){
      notifEnabled = true;
      alert("تم تفعيل الصوت ✅");
    }
  }catch{
    alert("اضغط على الشاشة أولاً");
  }
};

// جلب الطلبات
db.ref("orders").on("value", snap=>{
  const data = snap.val() || {};
  let newOrder = false;
  allOrders = [];

  Object.keys(data).forEach(table=>{
    Object.keys(data[table]).forEach(id=>{
      const o = data[table][id];

      if(!o.seen){
        newOrder = true;
        db.ref(`orders/${table}/${id}/seen`).set(true);
      }

      allOrders.push({id,table,...o});
    });
  });

  // 🚨 عند طلب جديد
  if(newOrder && notifEnabled){
    showBanner();       // رسالة
    playStrongAlert();  // صوت + اهتزاز

    if(Notification.permission === "granted"){
      new Notification("طلب جديد ☕");
    }
  }

  render();
});

// عرض الطلبات مع أزرار التعديل والحذف وتصفير الطاولة
function render(){
  container.innerHTML="";

  allOrders
  .sort((a,b)=>b.timestamp-a.timestamp)
  .forEach(o=>{

    const card=document.createElement("div");
    card.className="order-card";

    // ✨ وميض
    if(Date.now() - o.timestamp < 120000){
      card.classList.add("blink");
      setTimeout(()=>card.classList.remove("blink"),120000);
    }

    card.innerHTML=`
      <div class="order-header">
        <span>طاولة ${o.table}</span>
        <span class="status ${o.status||"pending"}">
          ${o.status==="done"?"جاهز":o.status==="cancel"?"ملغي":"قيد التحضير"}
        </span>
      </div>

      ${o.orders.map(i=>`
        <div class="order-item">
          ${i.name} ×${i.quantity}
        </div>
      `).join("")}

      <div class="total">
        ${o.orders.reduce((s,i)=>s+i.price*i.quantity,0)} د.ع
      </div>

      <div class="actions">
        <button class="delete">حذف</button>
        <button class="edit">ملاحظة</button>
        <button class="statusBtn">حالة</button>
        <button class="reset">تصفير</button>
      </div>
    `;

    const total = o.orders.reduce((s,i)=>s+i.price*i.quantity,0);

    // حذف الطلب
    card.querySelector(".delete").onclick=()=> {
      if(confirm("هل تريد حذف الطلب؟")){
        db.ref(`orders/${o.table}/${o.id}`).remove();
      }
    }

    // تعديل الملاحظة
    card.querySelector(".edit").onclick=()=> {
      let n = prompt("عدل الملاحظة:", o.note || "");
      if(n !== null) db.ref(`orders/${o.table}/${o.id}`).update({note:n});
    }

    // تغيير الحالة
    card.querySelector(".statusBtn").onclick=()=> {
      let s = prompt("pending / done / cancel", o.status || "pending");
      if(s) db.ref(`orders/${o.table}/${o.id}`).update({status:s});
    }

    // تصفير الطاولة
    card.querySelector(".reset").onclick=()=> {
      if(confirm("هل تريد تصفير الطاولة؟")){
        db.ref(`orders/${o.table}/${o.id}`).remove();
      }
    }

    container.appendChild(card);
  });
}
</script>

</body>
</html>
