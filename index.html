<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>88 Café - Admin Dashboard</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  font-family: Tahoma, sans-serif;
  margin:0;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}
h1{
  text-align:center;
  padding:15px;
  color:#ffd369;
  text-shadow: 1px 1px 6px #000;
}
#adminActions{
  display:flex;
  flex-wrap: wrap;
  justify-content:center;
  gap:10px;
  margin-bottom:15px;
}
#adminActions button{
  padding:10px 15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  flex:1;
  min-width:120px;
  transition:0.3s;
}
#adminActions button:hover{ transform: scale(1.05); }

#filters{
  display:flex;
  flex-wrap: wrap;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}
#filters input{
  padding:10px;
  border-radius:12px;
  border:none;
  text-align:center;
  background:rgba(255,255,255,0.1);
  color:white;
  min-width:140px;
}

#ordersContainer{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:15px;
  padding:10px;
}

.order-card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border-radius:20px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
}
.order-card:hover{ transform: scale(1.03); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }

.order-header{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
  margin-bottom:10px;
}

.order-item{
  background: rgba(255,255,255,0.12);
  margin:4px 0;
  padding:6px 10px;
  border-radius:10px;
  font-size:14px;
}

.status{
  padding:5px 10px;
  border-radius:10px;
  font-size:12px;
  font-weight:bold;
  color:#fff;
}
.pending{ background:#ff9800; }
.done{ background:#4caf50; }
.cancel{ background:#f44336; }

.actions{
  display:flex;
  gap:6px;
  margin-top:10px;
  flex-wrap: wrap;
}
.actions button{
  flex:1;
  padding:6px 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}
.delete{ background:#ff4d4d; color:white; }
.edit{ background:#4da6ff; color:white; }
.statusBtn{ background:#ffd369; }

.note{ font-size:13px; color:#ccc; margin-top:5px; }
.total{ text-align:right; margin-top:8px; font-weight:bold; font-size:16px; }

@media(max-width:480px){
  #adminActions, #filters{ flex-direction: column; align-items:center; }
}
</style>
</head>
<body>

<h1>لوحة تحكم 88 Café ☕</h1>

<div id="adminActions">
  <button id="resetTable" style="background:#ff6600;">تصفير الطاولة</button>
  <button id="dailyProfit" style="background:#4da6ff;">ربح اليوم</button>
  <button id="monthlyProfit" style="background:#28a745;">ربح الشهر</button>
</div>

<div id="filters">
  <input id="filterTable" placeholder="رقم الطاولة">
  <input id="filterItem" placeholder="اسم الصنف">
</div>

<div id="ordersContainer"></div>

<script>
// ===== Firebase =====
const firebaseConfig = {
  apiKey: "AIzaSyD4pAwLVIJp-YOzMX2WDqxAseTDxP3lek8",
  authDomain: "cafe-51180.firebaseapp.com",
  databaseURL: "https://cafe-51180-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cafe-51180",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== عناصر =====
const container = document.getElementById("ordersContainer");
const filterTable = document.getElementById("filterTable");
const filterItem = document.getElementById("filterItem");
let allOrders = [];

const audio = new Audio("https://freesound.org/data/previews/341/341695_62461-lq.mp3");

// إشعارات
function showNotification(title, body){
  if(Notification.permission === "granted"){
    new Notification(title, { body });
  } else if(Notification.permission !== "denied"){
    Notification.requestPermission().then(p=>{
      if(p==="granted") new Notification(title,{body});
    });
  }
}

// ===== جلب الطلبات =====
db.ref("orders").on("value", snapshot=>{
  const data = snapshot.val() || {};
  allOrders = [];
  let newOrder = false;

  Object.keys(data).forEach(table=>{
    Object.keys(data[table]).forEach(id=>{
      const order = data[table][id];
      if(!order.seen){
        newOrder = true;
        db.ref(`orders/${table}/${id}/seen`).set(true);
      }
      allOrders.push({id, table, ...order});
    });
  });

  if(newOrder){
    audio.play();
    navigator.vibrate([500,200,500]);
    showNotification("طلب جديد وصل", "يوجد طلب جديد في اللوحة!");
  }

  render();
});

// عرض الطلبات
function render(){
  container.innerHTML="";
  const t = filterTable.value.trim();
  const i = filterItem.value.toLowerCase();

  allOrders
    .filter(o => {
      const tableMatch = t ? o.table==t : true;
      const itemMatch = i ? o.orders.some(x=>x.name.toLowerCase().includes(i)) : true;
      return tableMatch && itemMatch;
    })
    .sort((a,b)=>b.timestamp-a.timestamp)
    .forEach(o=>{
      const card = document.createElement("div");
      card.className="order-card";
      const statusClass = o.status || "pending";

      card.innerHTML=`
        <div class="order-header">
          <span>طاولة ${o.table}</span>
          <span class="status ${statusClass}">${statusClass==="done"?"جاهز":statusClass==="cancel"?"ملغي":"قيد التحضير"}</span>
        </div>
        ${o.orders.map(i=>`<div class="order-item">${i.name} ×${i.quantity}</div>`).join("")}
        <div class="note">${o.note || ""}</div>
        <div class="total">${o.orders.reduce((s,i)=>s+i.price*i.quantity,0)} د.ع</div>
        <div class="actions">
          <button class="delete">حذف</button>
          <button class="edit">تعديل</button>
          <button class="statusBtn">تغيير الحالة</button>
        </div>
      `;

      // حذف
      card.querySelector(".delete").onclick=()=>{ db.ref(`orders/${o.table}/${o.id}`).remove(); };
      // تغيير الحالة
      card.querySelector(".statusBtn").onclick=()=>{
        let newStatus = prompt("اكتب الحالة: pending / done / cancel");
        if(newStatus) db.ref(`orders/${o.table}/${o.id}`).update({status:newStatus});
      };
      // تعديل الملاحظة
      card.querySelector(".edit").onclick=()=>{
        let newNote = prompt("عدل الملاحظة:", o.note||"");
        if(newNote !== null) db.ref(`orders/${o.table}/${o.id}`).update({note:newNote});
      };

      container.appendChild(card);
    });
}

// فلترة
filterTable.oninput = render;
filterItem.oninput = render;

// ===== تصفير الطاولة + إضافة للربح اليوم =====
document.getElementById("resetTable").onclick = async ()=>{
  const tableNum = prompt("أدخل رقم الطاولة لتصفير حسابها:");
  if(!tableNum) return;

  const tableOrdersRef = db.ref(`orders/${tableNum}`);
  const snapshot = await tableOrdersRef.get();
  if(!snapshot.exists()){ alert("الطاوله فارغة!"); return; }

  let total = 0;
  Object.values(snapshot.val()).forEach(o=>{
    total += o.orders.reduce((s,i)=>s+i.price*i.quantity,0);
  });

  // إضافة للربح اليوم
  const todayStr = new Date().toISOString().split('T')[0];
  const dailyProfitRef = db.ref(`profits/daily/${todayStr}`);
  dailyProfitRef.get().then(snap=>{
    const current = snap.val() || 0;
    dailyProfitRef.set(current + total);
  });

  // حذف الطلبات
  tableOrdersRef.remove().then(()=>alert(`تم تصفير الطاولة ${tableNum} وإضافة ${total} د.ع للربح اليوم!`));
};

// ربح اليوم
document.getElementById("dailyProfit").onclick = async ()=>{
  const todayStr = new Date().toISOString().split('T')[0];
  const snap = await db.ref(`profits/daily/${todayStr}`).get();
  const total = snap.val() || 0;
  alert(`ربح اليوم: ${total} د.ع`);
};

// ربح الشهر
document.getElementById("monthlyProfit").onclick = async ()=>{
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(),1);
  let profit = 0;
  const dailySnap = await db.ref("profits/daily").get();
  const allDaily = dailySnap.val() || {};
  Object.keys(allDaily).forEach(dateStr=>{
    const date = new Date(dateStr);
    if(date >= monthStart) profit += allDaily[dateStr];
  });
  alert(`ربح الشهر الحالي: ${profit} د.ع`);
};
</script>

</body>
</html>
